name: chinese_family_tree
description: A Chinese family tree application (家谱应用) for managing genealogy.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.3

  # State Management
  provider: ^6.0.5

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_form_builder: ^9.1.1
  form_builder_validators: ^9.1.0
  intl: ^0.18.1
  uuid: ^4.2.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: Noto Serif SC
  #     fonts:
  #       - asset: assets/fonts/NotoSerifSC-Regular.ttf
  #       - asset: assets/fonts/NotoSerifSC-Bold.ttf
  #         weight: 700
